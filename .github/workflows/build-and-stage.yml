name: build-and-stage

on:
  push:
    branches:
      - develop
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: build-stage-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_REPOSITORY: ${{ github.repository }}
  IMAGE_TAG: sha-${{ github.sha }}

jobs:
  build-artifact:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      image_ref: ${{ steps.meta.outputs.image_ref }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push immutable image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          target: prod
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_REPOSITORY }}:${{ env.IMAGE_TAG }}
          provenance: false

      - name: Create release manifest
        id: meta
        shell: bash
        run: |
          IMAGE_REF="${REGISTRY}/${IMAGE_REPOSITORY}:${IMAGE_TAG}"
          cat > release-manifest.json <<JSON
          {
            "commit": "${GITHUB_SHA}",
            "imageTag": "${IMAGE_TAG}",
            "services": {
              "orders-api": {
                "image": "${IMAGE_REF}",
                "digest": "${{ steps.push.outputs.digest }}"
              },
              "payments": {
                "image": "${IMAGE_REF}",
                "digest": "${{ steps.push.outputs.digest }}"
              },
              "worker": {
                "image": "${IMAGE_REF}",
                "digest": "${{ steps.push.outputs.digest }}"
              }
            }
          }
          JSON
          echo "image_ref=${IMAGE_REF}" >> "$GITHUB_OUTPUT"
          cat release-manifest.json

      - name: Upload release manifest
        uses: actions/upload-artifact@v4
        with:
          name: release-manifest-${{ github.sha }}
          path: release-manifest.json
          if-no-files-found: error

  deploy-stage:
    needs: build-artifact
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 30
    environment:
      name: stage
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Write stage env file
        shell: bash
        run: |
          cat > .env.stage <<EOF
          NODE_ENV=production
          DB_NAME=${{ secrets.STAGE_DB_NAME }}
          DB_USER=${{ secrets.STAGE_DB_USER }}
          DB_PASSWORD=${{ secrets.STAGE_DB_PASSWORD }}
          DB_HOST=${{ secrets.STAGE_DB_HOST }}
          DB_PORT=${{ secrets.STAGE_DB_PORT }}
          RABBITMQ_URL=${{ secrets.STAGE_RABBITMQ_URL }}
          AWS_REGION=${{ secrets.AWS_REGION }}
          S3_BUCKET=${{ secrets.S3_BUCKET }}
          AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
          EOF

      - name: Deploy to stage
        env:
          COMPOSE_PROJECT_NAME: orders-stage
          ENV_FILE: .env.stage
          APP_URL: ${{ secrets.STAGE_APP_URL }}
          DB_HOST: ${{ secrets.STAGE_DB_HOST }}
          DB_PORT: ${{ secrets.STAGE_DB_PORT }}
          API_PORT: ${{ secrets.STAGE_API_PORT }}
          RABBITMQ_URL: ${{ secrets.STAGE_RABBITMQ_URL }}
          RABBITMQ_MANAGEMENT_PORT: ${{ secrets.STAGE_RABBITMQ_MANAGEMENT_PORT }}
          ORDERS_API_IMAGE: ${{ needs.build-artifact.outputs.image_ref }}
          PAYMENTS_IMAGE: ${{ needs.build-artifact.outputs.image_ref }}
          WORKER_IMAGE: ${{ needs.build-artifact.outputs.image_ref }}
        run: ./scripts/deploy.sh stage
